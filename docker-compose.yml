services:
  llm-council-plus:
    build: .
    ports:
      - "${PORT:-8001}:8001"
      # MCP SSE transport port — uncomment to expose the MCP server for zero-install remote access.
      # Then start the MCP server inside the container (see docs/mcp/SETUP-REMOTE.md).
      # - "${MCP_PORT:-8002}:8002"
    environment:
      # Leave empty when serving frontend and API from this container.
      # Set to a full URL when the frontend is served elsewhere, for example:
      # BACKEND_HOST=https://api.example.com
      BACKEND_HOST: "${BACKEND_HOST:-}"
      # Comma-separated browser origins allowed to call the API.
      # Example: FRONTEND_HOST=https://council.example.com,http://1.2.3.4:8001
      FRONTEND_HOST: "${FRONTEND_HOST:-}"
      # Optional: TinyFish search API key (free tier, 5 req/min).
      # Get a key at https://agent.tinyfish.ai/api-keys
      TINYFISH_API_KEY: "${TINYFISH_API_KEY:-}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
